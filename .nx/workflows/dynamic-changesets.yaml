distribute-on:
  extra-small-changeset: 6 linux-large, 3 linux-extra-large
  small-changeset: 6 linux-large, 4 linux-extra-large
  medium-changeset: 6 linux-large, 5 linux-extra-large
  large-changeset: 6 linux-large, 6 linux-extra-large
  extra-large-changeset: 8 linux-large, 8 linux-extra-large
assignment-rules:
  - projects:
      - nx
      - workspace
      - remix
      - nx-maven-plugin
    targets:
      - install
      - test
    run-on:
      - agent: linux-large
        parallelism: 1
      - agent: linux-extra-large
        parallelism: 1

  - targets:
      - e2e-ci**
    run-on:
      - agent: linux-large
        parallelism: 2
      - agent: linux-extra-large
        parallelism: 4

  - targets:
      - bench:*
    run-on:
      - agent: linux-large
        parallelism: 1

  # These projects should not need to be isolated.
  - projects:
      - nx-dev
      - astro-docs
    targets:
      - build*
    run-on:
      - agent: linux-extra-large
        parallelism: 1
  - projects:
      - angular
      - react
    targets:
      - test
    run-on:
      - agent: linux-extra-large
        parallelism: 1

  - targets:
      - lint
    run-on:
      - agent: linux-large
        parallelism: 6
      - agent: linux-extra-large
        parallelism: 6

  - targets:
      - "*"
    run-on:
      - agent: linux-large
        parallelism: 3
      - agent: linux-extra-large
        parallelism: 3
