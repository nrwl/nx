distribute-on:
  extra-small-changeset: 4 linux-medium, 3 linux-large, 2 linux-extra-large
  small-changeset: 4 linux-medium, 3 linux-large, 2 linux-extra-large
  medium-changeset: 4 linux-medium, 3 linux-large, 2 linux-extra-large
  large-changeset: 6 linux-medium, 4 linux-large, 3 linux-extra-large
  extra-large-changeset: 8 linux-medium, 5 linux-large, 2 linux-extra-large
assignment-rules:

  - projects:
      - e2e-angular
      - e2e-node
      - e2e-react
    targets:
      - e2e-ci**
    run-on:
      - agent: linux-extra-large
        parallelism: 1
  # E2E tests that are heavy
  - projects:
      - e2e-next
      - e2e-gradle
      - e2e-plugin
    targets:
      - e2e-ci**
    run-on:
      - agent: linux-medium
        parallelism: 1
      - agent: linux-large
        parallelism: 1
      - agent: linux-extra-large
        parallelism: 2

  # All other e2e tests can run in parallel
  - targets:
      - e2e-ci**
    run-on:
      - agent: linux-medium
        parallelism: 1
      - agent: linux-large
        parallelism: 3
      - agent: linux-extra-large
        parallelism: 4

  - projects:
      - nx
      - workspace
      - remix
      - nx-maven-plugin
    targets:
      - install
      - test
    run-on:
      - agent: linux-medium
        parallelism: 1
      - agent: linux-large
        parallelism: 2
      - agent: linux-extra-large
        parallelism: 2

  # These projects should not need to be isolated.
  - projects:
      - nx-dev
    targets:
      - build*
    run-on:
      - agent: linux-extra-large
        parallelism: 1
  - projects:
      - angular
      - react
    targets:
      - test
    run-on:
      - agent: linux-extra-large
        parallelism: 2

  - targets:
      - lint
    run-on:
      - agent: linux-medium
        parallelism: 6
      - agent: linux-large
        parallelism: 12
      - agent: linux-extra-large
        parallelism: 24

  # TODO(altan): remove when scheduling issue resolved
  - projects:
      - nx-dev
    targets:
      - prebuild-banner
    run-on:
      - agent: linux-extra-large
        parallelism: 6

  - targets:
      - "*"
    run-on:
      - agent: linux-medium
        parallelism: 2
      - agent: linux-large
        parallelism: 3
      - agent: linux-extra-large
        parallelism: 4
