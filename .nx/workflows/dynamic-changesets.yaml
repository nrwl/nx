distribute-on:
  extra-small-changeset: 3 linux-large, 2 linux-extra-large
  small-changeset: 3 linux-large, 2 linux-extra-large
  medium-changeset: 3 linux-large, 2 linux-extra-large
  large-changeset: 4 linux-large, 3 linux-extra-large
  extra-large-changeset: 5 linux-large, 4 linux-extra-large
assignment-rules:
  # E2E tests that are heavy
  - projects:
      - e2e-angular
      - e2e-node
      - e2e-react
      - e2e-next
      - e2e-gradle
    targets:
      - e2e-ci**
    run-on:
      - agent: linux-extra-large
        parallelism: 4

  # All other e2e tests can run in parallel
  - targets:
      - e2e-ci**
    run-on:
      - agent: linux-large
        parallelism: 3
      - agent: linux-extra-large
        parallelism: 6

  - projects:
      - nx
      - workspace
      - remix
      - nx-maven-plugin
    targets:
      - install
      - test
    run-on:
      - agent: linux-large
        parallelism: 2
      - agent: linux-extra-large
        parallelism: 2

  # These projects should not need to be isolated.
  - projects:
      - nx-dev
      - astro-docs
    targets:
      - build*
    run-on:
      - agent: linux-extra-large
        parallelism: 1
  - projects:
      - angular
      - react
    targets:
      - test
    run-on:
      - agent: linux-extra-large
        parallelism: 2

  - targets:
      - lint
    run-on:
      - agent: linux-large
        parallelism: 12
      - agent: linux-extra-large
        parallelism: 24

  - targets:
      - "*"
    run-on:
      - agent: linux-large
        parallelism: 3
      - agent: linux-extra-large
        parallelism: 4
