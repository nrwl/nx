packages:
  - 'benchmarks'
  - 'packages/*'
  - 'e2e/*'
  - 'graph/*'
  - 'nx-dev/*'
  - 'tools/*'
  - 'astro-docs'
  - 'examples/*/*'
  - 'examples/angular-rspack/module-federation/host'
  - 'examples/angular-rspack/module-federation/remote'
  - 'packages/nx/native-packages/*'
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - 'nx'
  - '@nx/*'
  - '@nrwl/*'
  - 'create-nx-workspace'
  - 'create-nx-plugin'
  - 'tmp@0.2.7'
overrides:
  handlebars: '4.7.9'
  minimist: '^1.2.6'
  underscore: '^1.13.8'
  brace-expansion: '5.0.6'
  minimatch: '^10.2.5'
  shell-quote: '^1.8.4'
  tmp: '~0.2.7'
  form-data: '^4.0.6'
  # form-data@4.0.6 pulls hasown via two paths (direct + es-set-tostringtag);
  # pin to one version so expand-deps can flatten nx's published deps.
  hasown: '2.0.4'
onlyBuiltDependencies:
  - '@nestjs/core'
  - 'nx'
patchedDependencies:
  '@astrojs/starlight': 'patches/@astrojs__starlight.patch'
catalog:
  '@babel/core': '^7.23.2'
  '@heroicons/react': '^2.1.4'
  '@module-federation/enhanced': '^2.3.3'
  '@playwright/test': '^1.36.0'
  '@svgr/webpack': '^8.0.1'
  '@zkochan/js-yaml': '0.0.7'
  ajv: '^8.0.0'
  chalk: '^4.1.0'
  enquirer: '~2.3.6'
  gpt3-tokenizer: '^1.1.5'
  http-proxy-middleware: '^3.0.5'
  http-server: '^14.1.0'
  jsonc-parser: '^3.2.0'
  minimatch: '10.2.5'
  next-seo: '^5.13.0'
  ora: '^5.3.0'
  picomatch: '4.0.4'
  picocolors: '^1.1.0'
  react-textarea-autosize: '^8.5.3'
  rxjs: '^7.8.0'
  semver: '^7.6.3'
  tinyglobby: '^0.2.12'
  tmp: '~0.2.7'
  tree-kill: '^1.2.2'
  verdaccio: '^6.3.2'
  webpack: '5.105.2'
  webpack-dev-server: '5.2.4'
  which: '^3.0.1'
  yargs: '^17.6.2'
  yargs-parser: '21.1.1'
catalogs:
  angular:
    '@angular-devkit/architect': '~0.2200.0'
    '@angular-devkit/build-angular': '~22.0.0'
    '@angular-devkit/core': '~22.0.0'
    '@angular-devkit/schematics': '~22.0.0'
    '@angular/build': '~22.0.0'
    '@angular/cli': '~22.0.0'
    '@angular/common': '~22.0.0'
    '@angular/compiler': '~22.0.0'
    '@angular/compiler-cli': '~22.0.0'
    '@angular/core': '~22.0.0'
    '@angular/localize': '~22.0.0'
    '@angular/platform-browser': '~22.0.0'
    '@angular/platform-server': '~22.0.0'
    '@angular/router': '~22.0.0'
    '@angular/ssr': '~22.0.0'
    '@schematics/angular': '~22.0.0'
    ng-packagr: '~22.0.0'
    zone.js: '~0.16.2'
  angular-supported-versions:
    '@angular-devkit/build-angular': '>= 20.0.0 < 23.0.0'
    '@angular-devkit/core': '>= 20.0.0 < 23.0.0'
    '@angular-devkit/schematics': '>= 20.0.0 < 23.0.0'
    '@angular/build': '>= 20.0.0 < 23.0.0'
    '@angular/compiler-cli': '>= 20.0.0 < 23.0.0'
    '@angular/localize': '>= 20.0.0 < 23.0.0'
    '@angular/platform-server': '>= 20.0.0 < 23.0.0'
    '@angular/ssr': '>= 20.0.0 < 23.0.0'
    '@schematics/angular': '>= 20.0.0 < 23.0.0'
    ng-packagr: '>= 20.0.0 < 23.0.0'
    rxjs: '^6.5.3 || ^7.5.0'
    zone.js: '~0.15.0 || ~0.16.0'
  css:
    autoprefixer: '^10.4.9'
    less-loader: '^12.2.0'
    postcss: '^8.4.38'
    postcss-loader: '^8.1.1'
    sass: '^1.97.2'
    sass-embedded: '^1.97.2'
    sass-loader: '^16.0.7'
  eslint:
    '@angular-eslint/eslint-plugin': '^22.0.0'
    '@angular-eslint/eslint-plugin-template': '^22.0.0'
    '@angular-eslint/template-parser': '^22.0.0'
    '@typescript-eslint/type-utils': '^8.0.0'
    '@typescript-eslint/utils': '^8.0.0'
    angular-eslint: '^22.0.0'
    eslint-config-prettier: '^10.0.0'
  jest:
    '@jest/globals': '30.3.0'
    '@jest/reporters': '^30.0.2'
    '@jest/test-result': '^30.0.2'
    '@jest/types': '30.0.1'
    '@types/jest': '30.0.0'
    babel-jest: '30.3.0'
    identity-obj-proxy: '3.0.0'
    jest: '30.3.0'
    jest-config: '^30.0.2'
    jest-diff: '^30.0.2'
    jest-environment-jsdom: '^30.0.2'
    jest-environment-node: '^30.0.2'
    jest-resolve: '^30.0.2'
    jest-runtime: '^30.0.2'
    jest-util: '^30.0.2'
    ts-jest: '^29.4.7'
    '@swc/jest': '0.2.39'
    '@swc-contrib/mut-cjs-exports': '^14.3.0'
  react:
    '@types/react': '18.3.1'
    '@types/react-dom': '18.3.1'
    react: '18.3.1'
    react-dom: '18.3.1'
  rspack:
    '@rspack/cli': '^2.0.4'
    '@rspack/core': '^2.0.4'
    '@rspack/dev-server': '^2.0.1'
    '@rspack/plugin-react-refresh': '^2.0.0'
    ts-checker-rspack-plugin: '^1.3.0'
  typescript:
    '@phenomnomnominal/tsquery': '~6.2.0'
    '@types/node': '^24.11.0'
    ts-morph: '^28.0.0'
    ts-node: '10.9.1'
    tsconfig-paths: '^4.1.2'
    tslib: '^2.3.0'
    typescript: '~6.0.3'
  swc:
    '@swc/core': '^1.15.8'
    '@swc/helpers': '0.5.18'
    '@swc/cli': '0.8.0'
    '@swc-node/register': '^1.11.1'
  tailwind:
    '@tailwindcss/postcss': '^4.1.5'
    tailwind-merge: '^2.4.0'
  vite:
