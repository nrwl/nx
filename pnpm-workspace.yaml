allowBuilds:
  '@nestjs/core': true
  '@parcel/watcher': false
  '@swc/core': false
  '@tailwindcss/oxide': false
  core-js: false
  core-js-pure: false
  cypress: false
  detox: false
  dtrace-provider: false
  es5-ext: false
  esbuild: false
  less: false
  lmdb: false
  msgpackr-extract: false
  nx: true
  sharp: false
  unrs-resolver: false
