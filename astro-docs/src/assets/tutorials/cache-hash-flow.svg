<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 680 200">
  <style>
    text { font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace; }
  </style>

  <!-- Inputs column -->
  <text x="90" y="18" fill="#64748B" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.05em">INPUTS</text>

  <rect x="10" y="28" width="160" height="30" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="48" fill="#94A3B8" font-size="12" text-anchor="middle">source files</text>

  <rect x="10" y="64" width="160" height="30" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="84" fill="#94A3B8" font-size="12" text-anchor="middle">config files</text>

  <rect x="10" y="100" width="160" height="30" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="120" fill="#94A3B8" font-size="12" text-anchor="middle">external deps</text>

  <rect x="10" y="136" width="160" height="30" rx="6" fill="#1E293B" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="156" fill="#94A3B8" font-size="12" text-anchor="middle">CLI flags</text>

  <!-- Arrow from inputs to hash -->
  <path d="M185 96 L240 96" stroke="#475569" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Unique hash box -->
  <rect x="255" y="70" width="150" height="52" rx="8" fill="#3B82F6"/>
  <text x="330" y="93" fill="#fff" font-size="13" text-anchor="middle" font-weight="600">unique hash</text>
  <text x="330" y="110" fill="#BFDBFE" font-size="11" text-anchor="middle">abc123def...</text>

  <!-- Arrow from hash to cache lookup -->
  <path d="M420 96 L475 96" stroke="#475569" stroke-width="1.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Cache lookup label -->
  <text x="570" y="18" fill="#64748B" font-size="11" text-anchor="middle" font-weight="600" letter-spacing="0.05em">CACHE LOOKUP</text>

  <!-- Hit path -->
  <rect x="490" y="38" width="180" height="38" rx="6" fill="#1E293B" stroke="#22C55E" stroke-width="1.5"/>
  <text x="520" y="62" fill="#22C55E" font-size="12" font-weight="600">HIT</text>
  <text x="610" y="62" fill="#94A3B8" font-size="11" text-anchor="middle">replay output</text>

  <!-- Miss path -->
  <rect x="490" y="88" width="180" height="38" rx="6" fill="#1E293B" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="524" y="112" fill="#F59E0B" font-size="12" font-weight="600">MISS</text>
  <text x="614" y="112" fill="#94A3B8" font-size="11" text-anchor="middle">run, then store</text>

  <!-- Bottom note -->
  <text x="340" y="190" fill="#64748B" font-size="11" text-anchor="middle" font-style="italic">same inputs = same hash = cache hit</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>
</svg>
