",\"static/chunks/1772-4d23bfa2f5471d80.js\",\"6268\",\"static/chunks/6268-4a55c72c87b27d05.js\",\"9404\",\"static/chunks/app/blog/page-44631239af5f6807.js\"],\"ThemeSwitcher\"]\nf:T1ab8,"])</script><script>self.__next_f.push([1,"---\ntitle: Nx 19.8 Update!!\nslug: nx-19-8-update\nauthors: [Zack DeRose]\ntags: [nx, release]\ncover_image: /blog/images/2024-09-20/thumbnail.png\nyoutubeUrl: https://youtu.be/Zgv4LHvwGx0\npinned: true\n---\n\nNx 19.8 is here! This is our last minor release before we get ready to move ahead into Nx v20, which should land in October around the same time as the [Monorepo World Conference](https://monorepo.world/)!\n\nAs always, you can find the general details for all Nx releases on our [changelog](/changelog), as well as details on our [Github Releases for the Nx repo](https://github.com/nrwl/nx/releases).\n\n## Table of Contents\n\nIn this blog post:\n\n- [Nx Import](#nx-import)\n- [Improved Task Scheduling!](#improved-task-scheduling)\n- [Project Crystal Comes to Angular](#project-crystal-comes-to-angular)\n- [Crystalize Your Entire Workspace In One Command](#crystalize-your-entire-workspace-in-one-command)\n- [New Nx Workspaces Create with ESLint v9](#new-nx-workspaces-created-with-eslint-v9)\n- [Nx Release Enhancements](#nx-release-enhancements)\n- [Migrate to Latest](#migrate-to-latest)\n- [Round 2 of Monorepo World Conference Speakers Announced!!](#round-2-of-monorepo-world-conference-speakers-announced)\n- [Learn More](#learn-more)\n\n## Nx Import\n\nIn Nx 19.8, [`nx import`](/nx-api/nx/documents/import) has now moved from beta support to now generally available!\n\nNx Import is a new [top-level command of the Nx CLI](/reference/nx-commands) which allows you to import projects along with its git history from some other repository into your current Nx workspace.\n\nKeep an eye out for more on Nx Import on our [YouTube Channel](https://www.youtube.com/@nxdevtools) coming soon, and in the meantime be sure to check [the documentation](/nx-api/nx/documents/import) as this is now fully documented!\n\n## Improved Task Scheduling!\n\nWe've added some optimizations to the core of Nx - particularly around Nx's task scheduling. At the core of Nx is a task runner that supports [task dependencies](/features/run-tasks#defining-a-task-pipeline) (configurable for your entire workspace in the `targetDefaults` of your `nx.json` file, and on a per-project basis in your `project.json` files!), as well as the ability to run mulitple tasks in parallel.\n\nWith 19.8, nx will leverage historical data of previous runs of tasks to add some prioritization to the scheduling tasks that tend to take longer. This should optimize the total runtime of large batch commands in your workspace!\n\nRead more on [running tasks with Nx](/features/run-tasks)! And checkout [this new optimization on GitHub](https://github.com/nrwl/nx/pull/27783) for more details!\n\n## Project Crystal Comes to Angular\n\n[Project Crystal](/concepts/inferred-tasks) has come to Angular!\n\nProject Crystal allows Nx to _infer_ tasks for projects in your workspace - rather than requiring that they exist in every `project.json` or `angular.json` file of your workspace.\n\nYou can now run the command `nx init` in a project created by the Angular CLI, and we will generate `project.json` files for each angular project in your workspace - splitting that data out from the root `angular.json` file created by the Angular CLI.\n\nThis decision was made based on our feedback from the Angular community - where there is a strong preference for being able to split out the config.\n\n## Crystalize Your Entire Workspace In One Command\n\nWhen we initially launched [Project Crystal](/concepts/inferred-tasks), we shipped originally with `convert-to-inferred` generators, which would allow you to convert your workspace one plugin at a time.\n\nWith Nx 19.8, we've added a [`infer-targets`](/recipes/running-tasks/convert-to-inferred#migrate-all-plugins) generator, which will automatically detect all available `convert-to-inferred` generators, and run the ones you choose. You may also specify a specific project using the `--project` option of the generator.\n\n## New Nx Workspaces Created with ESLint v9\n\nWhen creating a new workspace with the command: `npx create-nx-workspace`, those workspaces will now be created with [`eslint`](https://www.npmjs.com/package/eslint) v9, and [`typescript-eslint`](https://www.npmjs.com/package/typescript-eslint) v8 - their most recent versions respectively.\n\nKeep in mind as well that ESLint v8 faces end-of-life on October 5th, meaning only [flat config](https://eslint.org/docs/latest/use/configure/migration-guide) is supported moving forward. Nx users should migrate to this new config format using [our flat config generator](/recipes/tips-n-tricks/flat-config#switching-to-eslints-flat-config-format).\n\nFor more on eslint's flat config, and how to use our generator to get to flat config checkout this video:\n\n{% youtube\nsrc=\"https://www.youtube.com/watch?v=32XH909CZrY\"\ntitle=\"ESLint Config Automation With Nx\"\n/%}\n\n## Nx Release Enhancements\n\n[`nx release`](/nx-api/nx/documents/release) is a framework/language/platform agnostic solution to versioning, publishing, and changelogs for your monorepo. We've been continuing to invest in Nx Release in 19.8, adding support specifically for [`pnpm publish`](https://pnpm.io/cli/publish) and [Github Enterprise Server](https://github.com/nrwl/nx/pull/26482)!\n\nWe also have a new feature from Nx Champion, Jonathan Gelin - which allows you to use `groupPreVersionCommand` in addition to the `preVersionCommand` when using the release groups feature to support [building before versioning](/recipes/nx-release/build-before-versioning).\n\n## Migrate to Latest\n\n{% youtube\nsrc=\"https://youtu.be/A0FjwsTlZ8A\"\ntitle=\"How Automated Code Migrations Work\"\n/%}\n\nAs always - updating Nx and its plugins is easy as we ship an [automated migration command](/features/automate-updating-dependencies).\n\n```shell\nnpx nx migrate latest\n```\n\nAfter updating your dependencies, run any necessary migrations.\n\n```shell\nnpx nx migrate --run-migrations\n```\n\n## Round 2 of Monorepo World Conference Speakers Announced!!\n\n[![Monorepo World](/blog/images/2024-08-01/monorepo-world.avif)](https://monorepo.world)\n\nThe [Monorepo World conference](https://monorepo.world) is coming up soon on October 7, 2024 at the Computer History museum in Mountain View, California.\n\n[Get your tickets now](https://ti.to/nx-conf/monorepoworld2024), consider [requesting access to the invite-only Enterprise Summit on October 8](https://ti.to/nx-conf/monorepoworld2024), and be sure to check out the [second round of speakers](https://monorepo.world/#speakers-title) that was just published earlier this week!\n\n## Learn more\n\n- [Nx Docs](/getting-started/intro)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n- [Speed up your CI](/nx-cloud)\n"])</script><script>self.__next_f.push([1,"10:Tcca,"])</script><script>self.__next_f.push([1,"---\ntitle: Introducing Explain with AI\nslug: 'explain-with-ai'\nauthors: ['Philip Fulcher']\ncover_image: '/blog/images/2024-07-29/explain-with-ai-header.avif'\ntags: [nx, nx-cloud, ai, release]\nyoutubeUrl: https://youtu.be/g2m9cHp-O-Q?si=ax-SKCO0Xvy9vFIz\npinned: true\n---\n\nIt's Friday, and you absolutely, positively have to deploy to production. But you can't get CI to pass your PR. What do you do? It's an inevitable part of your life as a developer, and you've built a collection of tools to deal with it: Google, MDN, Discord, ChatGPT. We've got one more tool for your toolbox: **\"Explain with AI\" for [Nx Cloud](/nx-cloud)**.\n\n## Your ticket to fast error debugging\n\n\"[Explain with AI](/ci/features/explain-with-ai)\" is a new feature for all Nx Cloud Pro users that is going to help you troubleshoot those pesky failing tasks. Whenever you get an error message on CI, look for the \"Explain with AI\" button on the upper right-hand corner:\n\n![Explain with AI button](/blog/images/2024-07-29/explain-with-ai-button.avif)\n\nOnce you hit that button, we collect the terminal output and other Nx task information and sprinkle some AI on top of it to give you a suggested fix. That should help you quickly get to the bottom of the issue and get back to work quickly.\n\n![Explain with AI explaining how to resolve the CI error](/blog/images/2024-07-29/explain-with-ai-2.avif)\n\nNo more switching back and forth between a dozen tabs with different solutions. No more providing the right context for your masterfully written chat prompt. **Get your suggested fix and get back to work.**\n\nAlso make sure [to check out our docs](/ci/features/explain-with-ai) for more information.\n\n## How can I start using this today?\n\n![Nx Cloud organization settings section for enabling AI features](/blog/images/2024-07-29/ai-features.avif)\n\nHere's how you get started:\n\n- **Step 1:** Go to your [Nx Cloud](https://cloud.nx.app/) organization settings\n- **Step 2:** Enable AI features\n- **Step 3:** Accept the Nx Cloud AI terms and conditions.\n- **Step 4:** You're all set ✨\n\nNote that you'll need to be an organization admin for your Nx Cloud workspace to enable AI features.\n\n{% call-to-action title=\"Log in to Nx Cloud\" url=\"https://cloud.nx.app\" icon=\"nxcloud\" description=\"Enable AI features in your organization settings\" %}\nLog in to Nx Cloud\n{% /call-to-action %}\n\n### I want to try this, but I'm on the Hobby plan 🤔\n\nIf you're currently on the Hobby plan, you can start a free Pro plan trial for 14 days to try it out on your own workspace. No, we don't ask for credit cards to start a trial, so feel free to experiment!\n\n## More to come!\n\nThis is just the first of a series of AI-powered features that we're going to be rolling out to your workspaces. We've got some cool features in the works already, which we're going to **announce publicly during the [Monorepo World](https://monorepo.world) conference in October**! So stay tuned!\n\n## Learn more\n\n- [Nx Docs](/getting-started/intro)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n- [Speed up your CI](/nx-cloud)\n"])</script><script>self.__next_f.push([1,"11:T340b,"])</script><script>self.__next_f.push([1,"---\ntitle: Reliable CI. A new execution model fixing both flakiness and slowness\nslug: 'reliable-ci-a-new-execution-model-fixing-both-flakiness-and-slowness'\nauthors: [Victor Savkin]\ncover_image: '/blog/images/2024-03-21/featured_img.png'\ntags: [nx, nx-cloud, releases]\npinned: true\n---\n\nThe proverbial slow and flaky CI isn’t the failure of the developers or even the testing tools. It’s the failure of the CI execution model we relied on for the last 20 years.\n\n**By switching from the old CI model, implemented as a graph of VMs, to the new one, implemented as a graph of tasks, we can solve both the flakiness and slowness.**\n\nIn this blog post I’ll explore why this is the case, and how you can do it by using Nx Cloud.\n\n---\n\n## History of CI\n\nIt’s easy to forget that Continuous Integration has been around for only 20 years. For reference, UI frameworks have been around since the 1970s.\n\n![](/blog/images/2024-03-21/bodyimg1.webp)\n\nThe innovation in the CI space has been primarily in where the CI process is described and how the configuration is written. How the CI actually works has largely remained the same.\n\n## How CI works\n\nA traditional CI execution is a directed acyclic graph (DAG) of virtual machines (VMs). Each VM (often called a job) installs dependencies, restores NPM cache, and then runs the necessary steps to verify that, say, some tests pass.\n\n![](/blog/images/2024-03-21/bodyimg2.webp)\n\n**This CI execution is a distributed process, and a poorly designed one. It works reasonably well only when the number of jobs/VMs is very small and falls apart when the number gets larger.**\n\n---\n\n## Why does the current system not work?\n\n**Every distributed system needs efficient communication between nodes and the ability to tolerate failure.**\n\nThe traditional CI execution model offers **very basic** means of communication: the status code propagation and ad-hoc ways of uploading/downloading files. Because the communication is effortful, in practice, **it’s either not done at all or very minimally.**\n\nTo understand why the traditional CI execution model fails to handle failures, let’s review the types of failures we can have.\n\nFailures can be:\n\n- hard _(npm fails to install, nothing can run)_\n- soft _(a test takes a lot longer than it should because, perhaps, due to an out-of-memory issue)_\n\nFocusing on the latter is just as important as focusing on the former. **Slow CI is broken CI.**\n\nTasks can fail:\n\n- legitimately _(a broken build)_\n- for external reasons _(npm install fails cause npm is down)_\n- for unknown reasons _(a flaky test)_\n\n**The traditional CI execution model doesn’t tolerate any of these failures.**\n\n## Problem in numbers\n\nLet’s see how varying a few parameters affects the probability of the CI execution failing.\n\n| Number of VMS | Avg Tests per VM | Flaky Test Probability | Slow Test Probability | Broken CI Builds (Flaky) | Slow CI Builds |\n| ------------- | ---------------- | ---------------------- | --------------------- | ------------------------ | -------------- |\n| 5             | 10               | 0.1%                   | 0.3%                  | 5%                       | 15%            |\n| 10            | 10               | 0.1%                   | 0.3%                  | 10%                      | 26%            |\n| 50            | 10               | 0.1%                   | 0.3%                  | 39%                      | 78%            |\n| 5             | 10               | 0.5%                   | 1%                    | 23%                      | 41%            |\n| 10            | 10               | 0.5%                   | 1%                    | 40%                      | 65%            |\n| 50            | 10               | 0.5%                   | 1%                    | 92%                      | 99%            |\n\n**The result is much worse than most intuitively expect.** For instance, assuming that an **e2e test has 1 in 1000 chance (0.1%) of failing** for a flaky reason, when the number of e2e tests reaches 500, **the probability of the CI failing for a flaky reason reaches 39%**, and the vast majority of CI executions are slowed down. Note, this is an exceptionally stable test suite. The bottom part of the table is more representative of a typical e2e suite, and the CI becomes “broken” at a much smaller scale.\n\nOne can try to fix it by increasing the robustness of the tests, but at some point, doing this is costly. If an e2e test has a 10% chance of a flaky failure, it’s relatively easy to bring this number to 1%. Going from 1% to 0.5% is harder. Going from 0.5% to 0.1% is exceptionally hard and may be practically impossible. Testing complex systems is simply a difficult task.\n\nThis is the formula for the failed CI run:\n\n![100 * (1 - chanceThatTestRunsWithoutFlakes ^ (avgTestsPerVm * numberOfVms))](/blog/images/2024-03-21/bodyimg3.webp)\n\n**As you can see, as the number of tests grows, the exponent will make more and more CI executions fail for flaky reasons. In this model, the only way to combat it is by increasing $chanceThatTestRunsWithoutFlakes$, but the more tests you have, the more challenging this becomes.** That's why a lot of projects move away from e2e tests or run them nightly (where they always fail).\n\n**It's not the team's fault. It's simply a losing battle with the current CI execution model.**\n\nWe focused on the tests but the issue is more general.\n\nVMs sometimes fail to execute their setup steps (e.g., some package fails to install), and in this model it results in a failed CI execution.\n\nOne of the setup steps can take a lot longer. Because the probabilities multiply, when the number of agents is high enough, this will happen frequently and will slow down a large number of CI executions. This is the formula for this case:\n\n![100 * (1 - chanceSetupIsFast ^ numberOfVms)](/blog/images/2024-03-21/bodyimg4.webp)\n\nFor instance, with 50 agents, if there is a **1% chance that NPM install will take an extra 5 minutes, 40% of CI executions will be affected by it**, and your CI execution time goes from, say, **20m to 25m**. The slowness doesn't amortize across agents.\n\n---\n\n## Solution: Change the model\n\n**There is only that much gain to be had by optimizing the effectiveness and robustness of small units. Instead, we should focus on creating the systems we can use to achieve incredible performance and resilience with ordinary small units.**\n\nThe CI model above has a fundamental problem: it is static. It defines a fixed number of VM, where each has a unique job to do. The VMs aren't interchangeable. If one of them fails or is slow, no other VM can help it.\n\nNx Cloud introduces an entirely different model. Instead of the graph of VMs, the CI execution is expressed as a graph of tasks.\n\nBy adding the following line…\n\n```shell\nnpx nx-cloud start-ci-run --distribute-on=\"3 linux-medium-js\"\n```\n\n... you are telling Nx Cloud to create five Nx Agents to execute all the tasks from all the commands that will follow.\n\n![](/blog/images/2024-03-21/bodyimg5.webp)\n\n**Nx Agents** are essentially VMs, but they are different from the ones in the traditional CI execution model.\n\nYou can imagine the **traditional CI** model as a team where every member is given a **unique set of tasks.** If a team member gets sick, their work won't be completed, and the **CI execution will fail.** If a team member is slow, **no one can help them.** Everyone will just have to wait for them to complete their assignment.\n\nThe **Nx Agent model** is a team where the **work doesn't get assigned ahead of time.** Instead, there is a pile of work in the middle of the room, and every **team member can take any piece of work** and do it. Once they are done with one piece of work, they can take another one. If a member gets sick, **a slightly smaller team can complete the job.** If a member is **slow**, the **other members will split the work.** In practice, it is even better than this. If an Nx Agent fails, another one will be started in its place.\n\n![](/blog/images/2024-03-21/bodyimg6.webp)\n\n## Solution in numbers\n\nLet's examine the two cases above.\n\nFirst, `npm install` **failing will not break the build.** Nx Cloud will simply spawn another Nx Agent in its place.\n\nThe slowness of the `npm install` will affect the CI execution but in a very different way because it will be **amortized across agents.** So with 50 agents executing, adding 5 minutes to an `npm install` of one of the agents, will only increase the CI execution time by 6 seconds _(5 _ 60 / 50)\\*.\n\nSecond, **[Nx Cloud knows what specific tests are flaky](/ci/features/flaky-tasks), and if they fail, it will rerun them on a separate agent.** Rerunning them on a separate agent is crucial. Often flaky failures will continue to fail when rerun on the same agent.\n\nThis is the formula:\n\n![chanceThatTestRunsWithoutFlakesUsingNx = 1 - (1 - chanceThatTestRunsWithoutFlakes) ^ numberOfTries](/blog/images/2024-03-21/bodyimg7.webp)\n\nIf we examine the case above, where the test flaky happened 1 in 1000, two retries will result in _1 - (1–0.999)^3^ = 0.999999999_, which **brings the likelihood of the CI failing for a flaky reason to 0.000005%.**\n\n**The Nx Cloud model handles both hard and soft failures. Your agents can crush or be slow - doesn't matter. Your tests can fail or be slow - doesn't matter. Your CI will complete fast.**\n\n---\n\n## Can we fix the traditional model?\n\nIt's possible to make the traditional CI model more reliable but the solution isn't adequate for large workspaces.\n\nFor instance, in principle, it is possible to add retrying logic to every CI step. It's cumbersome and widely-used CI steps (e.g., popular Github Actions) don't do it. But even if you manage to wrap every step, this isn't bulletproof because many failures are unrecoverable.\n\n**Slow setup steps simply cannot be fixed or amortized.**\n\nOne can add rerunning the same e2e test multiple times on the same machine to deal with flakes but there are numerous problems with this.\n\n**One of the most common reasons why e2e tests are flaky is because they create side effects.** For instance, they can create records in the db. They have some logic to clean it up, but it is imperfect. Or tests can assume that some fixture will be modified once. Ideally, this would never happen, but in practice it happens all the time. **Nx Cloud will always retry the same task on a different agent to avoid this problem.**\n\n**Don't forget, you actually need to know which tests are flaky. Most of your failures will be legitimate so rerunning all the tests will make you CI slow. And those reruns cannot be amortized.**\n\nThere are other practical problems. If you have enough VMs, rebuilding the app under test on each of them becomes impractical, so you need to build it once and send it to all your VMs. Your e2e tests have to be partitioned into small units to allow for efficient distribution. And the list of problems goes on.\n\n**The traditional CI model is not really fixable because it makes no assumptions about its execution steps and, as a result, it cannot do anything automatically.**\n\n**The Nx Cloud model only works when your build system and CI are built for each other.** The CI needs to know the task graph, what a task requires, what files it creates. Without this information, nothing can be distributed, nothing can be rerun or deflaked. Nx and Nx Cloud (with Nx Agents) fit together. Nx can run tasks locally or can pass this metadata to Nx Cloud which will orchestrate the same computation across many VMs. Nx Cloud will move the right files to the right agents, split large e2e test suites, and deflake the tests automatically. This only works because of the assumptions made by the CI and the build tool.\n\n---\n\n## Performance\n\nThe focus of this post is robustness. But the Nx Cloud model is also significantly faster and more efficient. Because Nx Agents are interchangeable, Nx Cloud will use a different number of agents depending on the size of the code change. It can split the work more effectively across agents, reduce the number of npm installs required, split large e2e suites into smaller units and more.\n\n## Summary\n\nThe spirit of this post is similar to Alan Kay's quote, \"A change of perspective is worth 80 IQ points\". By changing the CI execution model, Nx Cloud makes some difficult, almost unsolvable, problems easy.\n\n---\n\nYou can learn more about Nx Cloud on [nx.app](https://nx.app) and Nx open source on [nx.dev]().\n\n**Nx Cloud Pro includes a 2-month free trial** that is definitely worth trying out if you're curious what Cloud Pro can do for your CI. You can try out Nx Agents, e2e test splitting, deflaking and more. [Learn more about Nx Cloud Pro.](https://nx.app/campaigns/pro)\n\nWe also have a **Pro for Startups** plan which offers agents that are 3.5x cheaper than analogous VMs on CircleCI or Github Actions. [Learn more about Nx Pro for Startups.](https://nx.app/campaigns/pro-for-startups)\n\n---\n\n## Learn more\n\n- [Nx Docs](/getting-started/intro)\n- [X / Twitter](https://twitter.com/nxdevtools)\n- [LinkedIn](https://www.linkedin.com/company/nrwl)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Community Discord](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n- [Speed up your CI](https://nx.app)\n"])</script><script>self.__next_f.push([1,"12:T1742,"])</script><script>self.__next_f.push([1,"---\ntitle: Evolving Nx\nslug: evolving-nx\nauthors: [Jeff Cross]\ntags: [nx, release]\ncover_image: /blog/images/evolving-nx/thumbnail.png\n---\n\nOver the years, Nx has grown from a small 20% side project of our consulting business into a tool that empowers millions of developers worldwide and helps Fortune 500 companies ship high-quality software faster. In the last two years, we successfully transformed our consulting business into a product company, where our team can fully focus on evolving Nx and building Nx Cloud to extend Nx’s capabilities beyond local development.\n\nThis success is in large part thanks to:\n\n- Our commitment to building Nx as MIT-licensed open-source software, supported by the incredible contributions from our vibrant Nx community.\n- Close collaboration with our customers, allowing us to understand their needs and continuously improve Nx and Nx Cloud to address their demanding and complex challenges.\n\nWhen we have new ideas to make Nx better, we’ve always had two options: it could be in the open source build system, or it could be in the paid cloud product, [Nx Cloud](/nx-cloud). But sometimes, there are important things we want to offer that can solve some gnarly problems for teams but don’t require them to spend months convincing their IT department to incorporate yet another cloud service. So, we decided to create a collection of non-cloud-dependent Nx add-ons in a new package called **Nx Powerpack**, which will require paid licenses to use.\n\n## Introducing Nx Powerpack\n\n**[Nx Powerpack](/powerpack)** — our newest product designed to elevate the Nx CLI experience for enterprise environments. Powerpack offers advanced features like self-hosted remote cache storage, code ownership for monorepos, and workspace conformance, seamlessly integrating into sealed systems with strict security requirements. It’s also designed for ease of implementation, helping enterprises bypass lengthy procurement processes and quickly access the tools they need.\n\n\u003e If you want to get into the technical details, we wrote a separate blog post diving deeper into the technical details: [Introducing Nx Powerpack](/blog/introducing-nx-powerpack).\n\nEverything in Powerpack is new functionality, not previously free features that we’re now putting behind a paywall. However, this change coincides with some Nx improvements that will eventually interfere with users who were relying on our original filesystem-based implementation of local caching. We’ve completely rewritten Nx's local caching to be faster and more secure, partly by using a local database instead of checking the filesystem for artifact metadata. With this rewrite, any custom remote caches that rely on metadata reflected in the filesystem will not work as of Nx 21. This is why we decided to build an API into Powerpack to be able to connect Nx’s cache to different clouds and data sources. Now with Powerpack, teams can use an officially-supported implementation of remote caching, without needing to use Nx Cloud.\n\nThere’s a Steve Jobs quote that I think rings true with all of us at Nx:\n\n\u003e \"I think money is a wonderful thing because it enables you to do things. It enables you to invest in ideas that don't have a short-term payback.\" - Steve Jobs\n\nAs Nx has grown, we’ve hired more people to make the product better. Naturally, those people want to do good work and be paid. We all show up for work to build things we’re passionate about, and solve real pain points for the millions of developers using Nx every day. Money is what enables us to keep doing what we love. So as much as Victor Savkin and I want to just build things and give them away for free, we need to balance our personal passion with what’s the best long-term decisions for Nx — the project, the community, and the company.\n\nLike many open source projects, one of the bigger challenges to sustainability in recent years has been larger cloud products who wait for projects to become successful, and then try to capitalize on that success at the expense of the maintainers. To battle this, many open source projects have decided to make their open source licensing more restrictive, or introduce dual licenses, forcing those vendors to work with the maintainers on a fair arrangement. We think we’ve come up with a better solution for the community by introducing a new package, Powerpack, with a new commercial license, with only new functionality. **Nx itself still has one license: the MIT license.**\n\n![Nx products and their licenses](/blog/images/evolving-nx/nx-products-licenses.avif)\n\n### What about my open-source repo ?\n\nOpen source projects can continue to use Nx Cloud for **free** the same way they always have, and they can continue to use Nx with all its features. If you are an open-source maintainer and you want to use Powerpack, you will get a **free license**. Just reach out to us at [powerpack-support@nrwl.io](mailto:powerpack-support@nrwl.io).\n\n## How to Get Nx Powerpack\n\nPowerpack can be easily purchased as a one-off license and is automatically included for all existing enterprise customers. If you’re looking to purchase a license, you can [do so on this page](/powerpack).\n\nAre you a startup? If these features make sense for your team but the cost is a concern, reach out to our support team, and we’ll work with you to find a solution that fits.\n\n## Got Questions?\n\nIf you’re curious to learn more about these changes for Nx and how to get started, [check out our docs](/features/powerpack).\n\n## Learn more\n\n- [Nx Powerpack](/powerpack)\n- [Blog: Introducing Nx Powerpack](/blog/introducing-nx-powerpack)\n- [Docs: Powerpack features](/getting-started/intro)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n"])</script><script>self.__next_f.push([1,"13:T29df,"])</script><script>self.__next_f.push([1,"---\ntitle: Introducing Nx Powerpack\nslug: introducing-nx-powerpack\nauthors: [Juri Strumpflohner]\ntags: [nx, release]\ncover_image: /blog/images/introducing-powerpack/thumbnail.png\nyoutubeUrl: https://youtu.be/KZ0nh2lj8zE\n---\n\nToday we're introducing our latest product, **Nx Powerpack**, a suite of paid extensions for Nx, specifically designed around common enterprise needs. Now, before anyone draws the wrong conclusions:\n\n- No, we’re **not going to restrict Nx’s license**, lock you in, and then harvest. Nx remains MIT licensed and fully open source.\n- No, we’re **not placing existing features behind a paywall**. Nx Powerpack introduces new features on top of Nx (more about that below).\n- Yes, we still **strongly believe in OSS and our community**, and we will keep improving Nx more than ever; if anything, Powerpack will help us fund our OSS work on Nx core and ensure its long-term sustainability.\n\n### What about my open-source repo ?\n\nOpen source projects can continue to use Nx Cloud for **free** the same way they always have, and they can continue to use Nx with all its features. If you are an open-source maintainer and you want to use Powerpack, you will get a **free license**. Just reach out to us at [powerpack-support@nrwl.io](mailto:powerpack-support@nrwl.io).\n\nSo this leaves us with:\n![Nx products and their licenses](/blog/images/evolving-nx/nx-products-licenses.avif)\n\n\u003e But why are we releasing Nx Powerpack under a commercial license? Read all about our strategy, the reasoning behind Powerpack and OSS funding in the **blog post from our CEO, Jeff Cross**: [Evolving Nx](/blog/evolving-nx).\n\nBut now to the fun, technical part! Nx Powerpack is a bundle that - in this very first release - comes with three major features:\n\n- [Codeowners for monorepos](#codeowners-for-monorepos)\n- [Self-hosted cache storage](#selfhosted-cache-storage)\n- [Workspace conformance (beta)](#workspace-conformance-beta)\n\nLet’s dive in!\n\n## Get an Nx Powerpack License\n\nAll Powerpack features require a dedicated commercial license. You can get one here: [Nx Powerpack](/powerpack).\n\nOnce you have your license, run the following command\n\n```shell\nnpx nx activate-powerpack \u003cyour-license\u003e\n```\n\n## Codeowners for Monorepos\n\nSetting up Codeowners is highly recommended when designing a monorepo. If you’re not familiar, Codeowners is a common feature of VCS providers (such as GitHub, GitLab, Bitbucket, etc.), allowing you to enforce specific code reviewers to approve PRs. This functionality is especially important in a monorepo, where you manage multiple projects with multiple teams. You want to ensure the right people are reviewing the code being submitted.\n\nHere’s a simple example of a [GitHub CODEOWNERS definition](https://docs.github.com/en/repositories/managing-your-repositorys-settings-and-features/customizing-your-repository/about-code-owners):\n\n```plain {% fileName=\".github/CODEOWNERS\" %}\n/docs/ @doc-owner\n/apps/orders   @orders-team\n/apps/products   @products-team\n/libs/orders/** @orders-team\n/libs/products/** @products-team\n/libs/shared/** @infra-team\n```\n\nOne of the downsides of how codeowners works on today's VCS providers is that **they are folder-based**. That requires you to map your project paths to your codeowner files and keep maintaining that as you change your monorepo structure. And **this is exactly what we're going to automate**.\n\nIn a monorepo you reason based on projects. That's what you pass to your [Nx run commands](/features/run-tasks), what you see on the [project graph](/features/explore-graph) and also where owners should be defined. To get started install the Codeowners Powerpack plugin:\n\n```shell\nnpx nx add @nx/powerpack-owners\n```\n\nThis will allow you to define an owners section in your `nx.json` where you can define owners at the project level or even leverage project tags. Here's a small example:\n\n```json {% fileName=\"nx.json\" %}\n{\n    ...\n    \"owners\": {\n        \"format\": \"github\",\n        \"patterns\": [\n            {\n                \"description\": \"CI configuration\",\n                \"owners\": [\"@devops\"],\n                \"files\": [\".github/workflows/**\"]\n            },\n            {\n                \"description\": \"Order team\",\n                \"owners\": [\"@team-orders\"],\n                \"projects\": [\"tag:scope:orders\"]\n            },\n            {\n                \"description\": \"Product team\",\n                \"owners\": [\"@team-products\"],\n                \"projects\": [\"tag:scope:products\"]\n            },\n            {\n                \"description\": \"Design team\",\n                \"owners\": [\"@team-design\"],\n                \"projects\": [\"tag:scope:design-system\"]\n            }\n        ]\n    },\n  ...\n}\n```\n\nA dedicated `nx sync` command automatically synchronizes these definitions to a `CODEOWNERS` file that matches your VCS provider:\n\n```{% fileName=\".github/CODEOWNERS\" %}\n\n# CI configuration\n.github/workflows/** @devops\n\n# Design team\n/libs/shared/ui/angular/form-controls/ @team-design\n\n# Design team\n/libs/shared/ui/react/form-controls/ @team-design\n\n# Product team\n/libs/products/feat-product-detail/ @team-products\n\n# Order team\n/libs/orders/feat-current-orders/ @team-orders\n\n...\n```\n\nRead all about how to [configure Codeowners for your project in our docs](/features/powerpack/owners).\n\n## Self-hosted Cache Storage\n\nA continuous effort on our Nx core is to improve speed. Last year, we began **rewriting performance-critical parts of Nx into Rust**, and more core components are being rewritten. As part of this effort, we also changed how we manage local cache, moving from a **file-based to a database-based approach**. In addition to small performance gains from reduced I/O, this opens up many opportunities for improving local cache handling, such as keeping only relevant cache based on usage, more easily controlling maximum cache size, and optimizing task orchestration by running failed tasks earlier.\n\nAs part of this new approach we're also going to [deprecate custom task runners](/deprecated/custom-task-runners) in Nx 20. I bring this up because it might affect users that relied on 3rd party tools that hooked into the task runners API.\n\nTo fill in on the custom task runner API we're providing a new Powerpack plugin that allows you to use S3 or a network drive as your storing mechanism for your Nx cache.\n\nHere's an example of how to get started with [Amazon S3](https://aws.amazon.com/s3) based remote caching. First add the Powerpack plugin:\n\n```shell\nnpx nx add @nx/powerpack-s3-cache\n```\n\nThis will update your `nx.json` to add the new `cache` section.\n\n```json {% fileName=\"nx.json\" %}\n{\n    ...\n    \"s3\": {\n        \"bucket\": \"your-s3-bucket-name\",\n        \"region\": \"us-east-1\"\n    }\n}\n```\n\nTo then leverage the S3 powered remote cache on CI, [follow the official AWS documentation](https://github.com/aws-actions/configure-aws-credentials). Here's a short example snippet using OIDC to authenticate with AWS on GitHub Actions:\n\n```yaml {% fileName=\".github/workflows/ci.yml\" %}\nname: CI\n...\npermissions:\n  id-token: write\n  ...\n\nenv:\n  NX_DB_CACHE: true\n\njobs:\n  main:\n    runs-on: ubuntu-latest\n    steps:\n        ...\n\n      - name: 'Configure AWS Credentials'\n        uses: aws-actions/configure-aws-credentials@v4.0.2\n        with:\n          role-to-assume: arn:aws:iam::123456789123:role/GhAIBucketUserRole\n          aws-region: us-east-1\n\n        ...\n\n      - run: pnpm exec nx affected -t lint test build\n```\n\nSimilarly you can **set up network file based caching** using the `nx add @nx/powerpack-shared-fs-cache` package and by setting the `cacheDirectory` path in your `nx.json`.\n\nRead all about how to [set up S3 or network drive based caching for your Nx workspace in our docs](/features/powerpack/custom-caching).\n\n## Workspace Conformance (Beta)\n\nWe're releasing the `@nx/powerpack-conformance` plugin in an early preview. This new package focuses specifically on the maintainability of your monorepo. It allows you to encode your organization's standards so they can be enforced automatically. In this first version, the workspace conformance package ships with:\n\n- [Enforce Module Boundaries](/nx-api/powerpack-conformance#enforce-module-boundaries): Similar to the Nx ESLint [Enforce Module Boundaries rule](https://nx-dev-git-docs-powerpack-nrwl.vercel.app/features/enforce-module-boundaries), but enforces boundaries on every project dependency, not just those created from TypeScript imports or `package.json` dependencies.\n- [Ensure Owners](/nx-api/powerpack-conformance#ensure-owners): Requires every project to have an owner defined for the `@nx/powerpack-owners` plugin.\n\nTo get started, install the following package:\n\n```shell\nnpx nx add @nx/powerpack-conformance\n```\n\nThis allows you to define conformance rules in your `nx.json`. Here is an example:\n\n```json {% fileName=\"nx.json\" %}\n{\n    ...\n    \"conformance\": {\n        \"rules\": [\n            {\n                \"rule\": \"@nx/powerpack-conformance/enforce-module-boundaries\",\n                \"projects\": [\"!remix-app-e2e\"],\n                \"options\": {}\n            },\n            {\n                \"rule\": \"@nx/powerpack-conformance/ensure-owners\",\n                \"projects\": [\"!remix-app-e2e\"]\n            },\n            {\n                \"rule\": \"./tools/local-conformance-rule.ts\"\n            }\n        ]\n    }\n}\n```\n\nYou can also define rules locally, as shown in the example above, which are simple TypeScript files:\n\n```ts\nimport { createConformanceRule } from '@nx/powerpack-conformance';\n\nconst rule = createConformanceRule({\n  name: 'local-conformance-rule-example',\n  category: 'security',\n  reporter: 'project-reporter',\n  implementation: async (context) =\u003e {\n    return {\n      severity: 'low',\n      details: {\n        violations: [],\n      },\n    };\n  },\n});\n\nexport default rule;\n```\n\nYou can then run `nx conformance` to execute the conformance checks:\n\n![Screenshot of the conformance check output](/blog/images/introducing-powerpack/conformance-check.avif)\n\nIn this first preview release, you'll only be able to run workspace conformance rules on a single workspace. In future iterations, you **will be able to connect it to your existing Nx Cloud organization**, allowing you to upload conformance rules and run them across connected workspaces.\n\nRead all the details on how to [get started with workspace conformance rules in our docs](/features/powerpack/conformance).\n\n## Learn More\n\n- [Nx Docs](/getting-started/intro)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n"])</script><script>self.__next_f.push([1,"14:T43a,---\ntitle: '\"The Pit of Success\" w/ Ruben Casas of Postman | Nx Enterprise Podcast Episode 5'\nslug: 'pit-of-success-podcast-5'\nauthors: ['Zack DeRose']\ntags: [podcast]\ncover_image: /blog/images/2024-09-18/podcast-5-thumbnail.png\npodcastYoutubeId: oTZLTNtndxc\npodcastSpotifyId: 7LJlqLGR708OccUwyzz9wT\npodcastAmazonUrl: https://music.amazon.com/podcasts/a221fdad-36fd-4695-a5b4-038d7b99d284/episodes/352e8cef-b8df-4e81-be38-96a0cf62e0f5/the-enterprise-software-podcast-by-nx-the-enterprise-software-podcast-by-nx-5-ruben-casas-postman\npodcastAppleUrl: https://podcasts.apple.com/us/podcast/the-enterprise-software-podcast-by-nx-5-ruben-casas-postman/id1752704996?i=1000669972799\npodcastIHeartUrl: https://www.iheart.com/podcast/269-the-enterprise-software-po-186891508/episode/the-enterprise-software-podcast-by-nx-217668148/\n---\n\nIn this episode, Zack sits down with Ruben of Postman to discuss:\n\n- The evolution of Frontend Architecture\n- The AngularJS to Angular2 transition and the rise of TS and RXJS\n- Why React doesn't get enough credit\n- Platform teams and the pit of success\n15:{\"name\":\"Zack DeRose\",\"image\":\"/blog/images/Zack DeRose.jpeg\",\"twitter\":\"zackderose\",\"github\":\"ZackDeRose\"}\n16:Tb5f,"])</script><script>self.__next_f.push([1,"---\ntitle: Announcing your Monorepo World Speakers Part 2\nslug: announcing-your-monorepo-world-speakers-pt-2\nauthors: ['Mike Hartington']\ntags: [monorepo-world]\ncover_image: /blog/images/2024-09-16/mw-blog-post.avif\n---\n\n[Monorepo World](https://monorepo.world) is our two-track conference bringing together experts in developer tooling and of course, monorepos. We’re thrilled to share some of this year's speakers, including folks from Aspect Build Systems, Trunk.io, Aviator Technologies, and Postman. Without further ado, let’s meet your speakers!\n\n## Python Monorepos with Bazel\n\n[Alex Eagle](https://x.com/Jakeherringbone), Aspect Build Systems\n\nBazel is Google’s open source incremental build tool made for extreme scalability and support for many languages. Let’s look at how Bazel can provide features like CI/CD, building and testing, as well as formatting/linting in a Python environment.\n\n## Merge Queues at Scale\n\n[Joshua Marinacci](https://x.com/joshmarinacci), Trunk\n\nMerge queues are quickly becoming a requirement for high-traffic repos, especially monorepos, - coordinating and merging many PRs from many people while avoiding breaking main can become quite a manual and involved task. This talk will explain what a merge queue is, their features, and how smart merge queues can take advantage of Monorepos with build graphs to scale as the repo grows.\n\n## Scaling Ownership to Improve Developer Experience\n\n[Ankit Jain](https://x.com/ankitxg), Aviator Technologies\n\nOwnership of code and services can become complex and unwieldy, especially as engineering teams scale and codebase complexity grows. This talk will explore practical strategies to streamline ownership management, addressing the intricacies of reorgs, shifting priorities, and codebase complexities.\n\n## Poly Monorepos, the Best of the Two Worlds\n\n[Jonathan Gelin](https://x.com/jonathan_gelin), Nx Champion\n\nWe often pit Polyrepos against Monorepos, but why not merge the best of both worlds? In this session, let's look at effective management of distributed monorepos from both decentralized and centralized perspectives.\n\n## How to Prevent a Wrong Version Breaking Your Micro Frontends\n\n[Patrick Sevat](https://x.com/_Sevat), Postman\n\n“Oops, it turns out my PR was actually a breaking change. I'm so sorry I broke production for all apps except ours”. This developer nightmare was the worst case scenario the team at Postman has solved. This talk will focus on how shared dependencies can keep federated apps small in bundle size, but come at the risk of breaking other apps when semantic versioning (SemVer) is not adhered to.\n\nWe hope you’re excited to see these amazing sessions! We’ll have more to share soon about what other speakers you can expect to see at Monorepo world! Don’t forget to register and get your ticket before it’s too late 😱!\n\n[Get your tickets today!](https://bit.ly/3YZcb5r)\n"])</script><script>self.__next_f.push([1,"17:T47df,"])</script><script>self.__next_f.push([1,"---\ntitle: Next-Gen Module Federation Deployments with Nx and Zephyr Cloud\nslug: next-gen-module-federation-deployment\nauthors: ['Colum Ferry']\ntags: [nx, module federation, rspack, zephyr cloud]\ncover_image: /blog/images/2024-09-12/next-gen-module-federation-deployments.png\npublished: true\n---\n\nNx has supported Module Federation for a long time now and its popularity is seeing year-on-year increase. It has proven\nto be the defacto solution for modern Micro Frontends and Nx has embraced this and helped developers scaffold projects\nthat use Module Federation; offering the most scalable and the most developer friendly experience to do so.\nHowever, we have always taken a step back when it came to the final piece of the puzzle: **Deployment**.\n\nMicro Frontends are, by their very nature, more complex to deploy. You are no longer deploying one build artifact but\nrather, many build artifacts that could even be on different release cadences from each other. And yet, we still expect\nthe final application that our users interact with to be stable.\n\nThere are so many approaches to deployments - think Kubernetes, Storage Buckets with DNS, EC2 instances etc - that it\nhas always been difficult for us to recommend a solution. That was until [Zephyr Cloud](https://www.zephyr-cloud.io/)\nentered the game.\n\nZephyr Cloud is a \"bring your own cloud\" deployment platform with best-in-class support for module federation projects\nthat integrates right into your application build, providing seamless deployments without having to learn any new\ncommands.\nWith features such as:\n\n- Auto-deployment on build\n- Live Preview link generation\n- Version rollback and roll-forward\n- Micro Frontend dependency management\n- A Chrome Extension to manage environments\n- Support for a wide range of Cloud Platforms (such as [Cloudflare](https://www.cloudflare.com/en-gb/)\n  and [Netlify](https://www.netlify.com/))\n- A beautiful UI to visualize your deployments\n\nAnd so much more, Zephyr Cloud really is one of the best deployment solutions available.\n\n{% callout type=\"note\" title=\"Zephyr Cloud Features\" %}\nYou can learn more about the full feature set that Zephyr Cloud\noffers [here](https://docs.zephyr-cloud.io/#main-features).\n{% /callout %}\n\nI myself, Colum Ferry, after having been allowed to experiment with it in its infancy back in February 2024 said\n\n\u003e Zephyr Cloud is the Micro Frontend orchestration tool you never knew you needed.\n\u003e What they have built will change the deployments for the better.\n\u003e Think of the disruption k8s caused. Zephyr Cloud will do the same for the Micro Frontend world.\n\u003e\n\u003e _Reference: [Linkedin](https://www.linkedin.com/posts/colum-ferry-3a36a9169_zephyr-cloud-is-the-micro-frontend-orchestration-activity-7183207192991289344-6mSR)_\n\nAnd I stand by that statement.\n\nTherefore, in this article I'll show you how to set up React Module Federation with Nx and Rspack and how to integrate\nit with Zephyr Cloud for deployment.\n\n## Step 1: Set Up the Nx Workspace\n\nWe'll start by creating an empty Nx workspace:\n\n```{% command=\"npx create-nx-workspace myorg\" path=\"~\" %}\nNX   Let's create a new workspace [https://nx.dev/getting-started/intro]\n\n✔ Which stack do you want to use? · none\n✔ Package-based monorepo, integrated monorepo, or standalone project? · integrated\n✔ Which CI provider would you like to use? · github\n\n NX   Creating your v19.7.0 workspace.\n\n✔ Installing dependencies with npm\n✔ Successfully created the workspace: myorg.\n✔ Nx Cloud has been set up successfully\n✔ CI workflow has been generated successfully\n\n```\n\nNext, we'll want to navigate into our new workspace:\n\n```shell\ncd myorg\n```\n\nAnd finally, we'll add the [`@nx/react`](/nx-api/react) plugin to our workspace.\n\n```shell\nnpx nx add @nx/react\n```\n\n## Step 2: Scaffold the Module Federation Projects\n\nNow that we have the `@nx/react` package installed, we have access to all the generators it offers. We'll use the `host`\ngenerator now to scaffold out Module Federation projects.\n\n{% callout type=\"note\" title=\"Generating host applications\" %}\nIf you'd like a more indepth recipe for scaffolding `host` and `remote` generators you can take a look through\nour [Module Federation Recipes](/recipes/module-federation).\n{% /callout %}\n\n```{% command=\"npx nx g @nx/react:host shell --remotes=remote1 --bundler=rspack\" path=\"~/myorg\" %}\n NX  Generating @nx/react:host\n\n✔ Which stylesheet format would you like to use? · css\n✔ Which E2E test runner would you like to use? · playwright\nFetching prettier...\nFetching @nx/rspack...\nFetching @nx/playwright...\nFetching @nx/jest...\n\n// REMOVED FOR BREVITY\n\n NX   👀 View Details of shell\n\nRun \"nx show project shell\" to view details about this project.\n\n NX   👀 View Details of remote1\nRun \"nx show project remote1\" to view details about this project.\n```\n\nWith that, two applications will be added to our workspace `shell` and `remote` as well as their counterpart e2e\nprojects.\n\n{% callout type=\"note\" title=\"Running tasks\" %}\nThese projects contain all the usual tasks you would expect to see with a Nx project such as `build`, `serve`, `test`,\n`lint`.\nYou can learn more about Running Tasks in Nx [here](/features/run-tasks).\n{% /callout %}\n\nWe specified `--bundler=rspack` indicating that the applications should be built with [Rspack](https://rspack.dev/).  \n_This support has been newly added to Nx since Nx 19.7.0._\n\nYou'll note the `shell/rspack.config.ts` file. It's contents should match the following:\n\n```ts {% fileName=\"shell/rspack.config.ts\" %}\nimport { composePlugins, withNx, withReact } from '@nx/rspack';\nimport {\n  withModuleFederation,\n  ModuleFederationConfig,\n} from '@nx/rspack/module-federation';\n\nimport baseConfig from './module-federation.config';\n\nconst config: ModuleFederationConfig = {\n  ...baseConfig,\n};\n\n// Nx plugins for rspack to build config object from Nx options and context.\n/**\n * DTS Plugin is disabled in Nx Workspaces as Nx already provides Typing support for Module Federation\n * The DTS Plugin can be enabled by setting dts: true\n * Learn more about the DTS Plugin here: https://module-federation.io/configure/dts.html\n */\nexport default composePlugins(\n  withNx(),\n  withReact(),\n  withModuleFederation(config, { dts: false })\n);\n```\n\nIf you have experience with our `webpack` Module Federation support, you'll note that this file is very similar to the\n`webpack.config.ts` files we would have generated. The only real difference is that the imports point to `@nx/rspack`.\n\n{% callout type=\"note\" title=\"Module Federation 2.0\" %}\nModule Federation is still under active development, however, all new development is being included in Rspack as well as\nthe `@module-federation/enhanced` package.\n\nModule Federation 2.0 brings new features such\nas [Federation Runtime](https://module-federation.io/guide/basic/runtime.html)\nand [Runtime Plugins](https://module-federation.io/plugin/dev/index.html).\nThese are significant advancements which offer a vast range of capabilities to Module Federation projects.\n\nNx itself has employed this strategy to solve a long-standing issue with shared workspace libraries wherein there was\nthe possibility that a shared library would be served from a static remote. This in turn would prevent HMR updates to\nthe library from being reflected in the locally served application.\nYou can learn more about the\n`NxRuntimeLibraryControlPlugin` [here](/concepts/module-federation/nx-module-federation-technical-overview).\n{% /callout %}\n\n## Step 4: Building and Serving\n\nTo build all the applications in the workspace, run the following:\n\n```{% command=\"npx nx run-many -t build\" path=\"~/myorg\" %}\n\n   ✔  nx run remote1:build:production (2s)\n   ✔  nx run shell:build:production (526ms)\n\n———————————————————————————————————————————————————————————————————————————————————————\n\n NX   Successfully ran target build for 2 projects (3s)\n```\n\nThis will build the applications with Rspack. You can observe the build artifacts in the `dist/` folder.\n\nTo serve the Module Federation setup, we recommend only serving the `host` application.\n\n{% callout type=\"note\" title=\"Serving all Module Federation Projects\" %}\n\nNx purpose-built a `serve` executor for Module Federation Projects. This executor will find all the `remote`\napplications that the `host` depends on and serves them, either statically or with HMR/Live Reloading.\n\nServing statically means that we can reuse the build artifacts for the `remotes` for a faster dev-server startup time\nthat is scalable. Combined with Nx caching, this works well to ensure a great developer experience.\n\nYou can learn more about how this works in\nour [Nx Module Federation Technical Overview](/concepts/module-federation/nx-module-federation-technical-overview#what-happens-when-you-serve-your-host)\ndocument.\n\n{% /callout %}\n\nRun the following command to serve the `host` application with the `remote` served statically:\n\n```{% command=\"npx nx serve shell\" path=\"~/myorg\" %}\n\u003e nx run shell:serve\n\n\n NX  Starting module federation dev-server for shell with 1 remotes\n\n\n NX  Building 1 static remotes...\n\n\n NX  Built 1 static remotes\n\n\n NX  Starting static remotes proxies...\n\n\n NX  Static remotes proxies started successfully\n\n[ Module Federation Manifest Plugin ]: Manifest will use absolute path resolution via its host at runtime, reason: publicPath='auto'\n\u003ci\u003e [webpack-dev-server] Project is running at:\n\u003ci\u003e [webpack-dev-server] Loopback: http://localhost:4200/, http://[::1]:4200/\n\u003ci\u003e [webpack-dev-server] 404s will fallback to '/index.html'\n●  ━━━━━━━━━━━━━━━━━━━━━━━━━ (70%) sealing after module optimization                    [ Module Federation Manifest Plugin ] Manifest Link: {auto}/mf-manifest.json\n●  ━━━━━━━━━━━━━━━━━━━━━━━━━ (98%) emitting emit                                        Starting up http-server, serving dist\n\nhttp-server version: 14.1.1\n\nhttp-server settings:\nCORS: true\nCache: -1 seconds\nConnection Timeout: 120 seconds\nDirectory Listings: visible\nAutoIndex: visible\nServe GZIP Files: false\nServe Brotli Files: false\nDefault File Extension: none\n\nAvailable on:\n  http://localhost:4202\nHit CTRL-C to stop the server\n\n\n NX  Server ready at http://localhost:4200\n```\n\nIf you navigate to `http://localhost:4200` your application will render and you'll be able to navigate between the\n`host` and the `remote`.\n\n## Step 4: Deployment\n\nGranted what we have currently is not something you'd likely see in a production application, we'll use it as is to\ndemonstrate deployment with Zephyr Cloud.\n\n{% callout type=\"note\" title=\"Zephyr Cloud Nx Recipe\" %}\n\nZephyr Cloud also has a recipe that you can follow to set up Nx React Module Federation with Zephyr\nCloud [here](https://docs.zephyr-cloud.io/recipes/react-rspack-nx).\n\n{% /callout %}\n\nI'll break this section into sub-steps to make it easier to follow.\n\n### Step 1: Add `package.json` and First Commit\n\nFirst, we need to add `package.json` files to our `shell` and `remote1` projects. This is used by Zephyr Cloud to\ndetermine the name and version of the projects for deployment.\n\nCreate the following files:\n\n{% tabs %}\n{% tab label=\"shell/package.json\" %}\n\n```json {% fileName=\"shell/package.json\" %}\n{\n  \"name\": \"shell\",\n  \"version\": \"0.0.0\"\n}\n```\n\n{% /tab %}\n{% tab label=\"remote1/package.json\" %}\n\n```json {% fileName=\"remote1/package.json\" %}\n{\n  \"name\": \"remote1\",\n  \"version\": \"0.0.0\"\n}\n```\n\n{% /tab %}\n{% /tabs %}\n\nOnce this is done, add all staged files and create a git commit.\n\n```shell\ngit add .\ngit commit -m \"initial commit\"\n```\n\n### Step 2: Create a GitHub Repository\n\nNext, we need to add a GitHub repository. It can be public or private, it will not affect the deployments by Zephyr\nCloud.\n\n{% callout type=\"note\" title=\"Why is this needed?\" %}\nBehind the scene, Zephyr Cloud will map your git configuration (remote origin url, organization or username, repository\nname and branch) to deploy your application. Without this step the deployment will fail.\n{% /callout %}\n\nIf you don't already have the [GitHub CLI](https://cli.github.com/) installed, I would highly recommend it.\n\nYou can then run the following to create your GitHub Repository from your terminal:\n\n```{% command=\"gh repo create\" path=\"~/myorg\" %}\n? What would you like to do? Push an existing local repository to GitHub\n? Path to local repository .\n? Repository name nx-zephyr-cloud-example\n? Repository owner Coly010\n? Description Example of Nx React Rspack Module Federation with Zephyr Cloud\n? Visibility Private\n✓ Created repository Coly010/nx-zephyr-cloud-example on GitHub\n  https://github.com/Coly010/nx-zephyr-cloud-example\n? Add a remote? Yes\n? What should the new remote be called? origin\n✓ Added remote https://github.com/Coly010/nx-zephyr-cloud-example.git\n? Would you like to push commits from the current branch to \"origin\"? Yes\n```\n\n### Step 3: Add Zephyr Cloud\n\nTo add Zephyr Cloud itself, we need to install their `zephyr-webpack-plugin`.\n\n{% callout type=\"note\" title=\"Rspack and Webpack Interop\" %}\nThe plugin is indeed written for Webpack, however, one of the big advantages of Rspack is the interoperability it offers\nfor the Webpack Ecosystem.\nYou can learn more about this compatability [here](https://rspack.dev/guide/compatibility/plugin).\n{% /callout %}\n\nRun the following to install the plugin:\n\n```shell\nnpm install zephyr-webpack-plugin\n```\n\nNow that the plugin has been installed in our workspace, we need to update the `rspack.config.ts` files to use it.\nThis is a very simple two line change:\n\n```ts\nimport { withZephyr } from 'zephyr-webpack-plugin';\n\nexport default composePlugins(\n  ...,\n  withZephyr()\n)\n```\n\nYou'll need to make these updates to the following files:\n\n- `shell/rspack.config.ts`\n- `shell/rspack.config.prod.ts`\n- `remote1/rspack.config.ts`\n\nFor example, your `shell/rspack.config.ts` file should now match the following:\n\n```ts {% fileName=\"shell/rspack.config.ts\" %}\nimport { composePlugins, withNx, withReact } from '@nx/rspack';\nimport {\n  withModuleFederation,\n  ModuleFederationConfig,\n} from '@nx/rspack/module-federation';\nimport { withZephyr } from 'zephyr-webpack-plugin';\n\nimport baseConfig from './module-federation.config';\n\nconst config: ModuleFederationConfig = {\n  ...baseConfig,\n};\n\n// Nx plugins for rspack to build config object from Nx options and context.\n/**\n * DTS Plugin is disabled in Nx Workspaces as Nx already provides Typing support for Module Federation\n * The DTS Plugin can be enabled by setting dts: true\n * Learn more about the DTS Plugin here: https://module-federation.io/configure/dts.html\n */\nexport default composePlugins(\n  withNx(),\n  withReact(),\n  withModuleFederation(config, { dts: false }),\n  withZephyr()\n);\n```\n\n### Step 4: First Deployment\n\nWith all the `rspack.config.ts` files updated, getting your first deployment is as simple as running:\n\n```{% command=\"npx nx run-many -t build --verbose\" path=\"~/myorg\" %}\n\u003e nx run remote1:build:production\n...\n\n ZEPHYR   Opening browser for authentication...\n ZEPHYR   Hi colum_nrwl_io!\n ZEPHYR   remote1.nx-zephyr-cloud-example.coly010#6\n ZEPHYR\n ZEPHYR   Uploaded local snapshot in 152ms\n ZEPHYR   (12/12 assets uploaded in 235ms, 332.55kb)\n ZEPHYR   Deployed to Zephyr's edge in 352ms.\n ZEPHYR\n ZEPHYR   https://colum_nrwl_io_6-remote1-nx-zephyr-cloud-example-c-e7ab3d770-ze.zephyrcloud.app\n\n...\nRspack 1.0.4 compiled with 1 warning in 3.91 s\n\n\u003e nx run shell:build:production\n...\n\n ZEPHYR   Hi colum_nrwl_io!\n ZEPHYR   shell.nx-zephyr-cloud-example.coly010#7\n ZEPHYR\n ZEPHYR   Uploaded local snapshot in 165ms\n ZEPHYR   (10/10 assets uploaded in 202ms, 326.42kb)\n ZEPHYR   Deployed to Zephyr's edge in 248ms.\n ZEPHYR\n ZEPHYR   https://colum_nrwl_io_7-shell-nx-zephyr-cloud-example-col-04ccb4027-ze.zephyrcloud.app\n\n...\nRspack 1.0.4 compiled with 1 warning in 1.29 s\n```\n\nAt this point, a page will likely be opened in your browser where you can create your Zephyr Cloud account and\nauthenticate the CLI to allow it to deploy the applications to your account.\n\nYou'll note that the output from this is not the same as the output we received earlier when we ran\n`npx nx run-many -t build`.\nIn particular, the most recent set of logs contains the URLs of the deployed application (_Note: your URL should be\ndifferent_):\n\n```{% command=\"npx nx run-many -t build --verbose\" path=\"~/myorg\" %}\n\u003e nx run remote1:build:production\n...\n ZEPHYR   https://colum_nrwl_io_6-remote1-nx-zephyr-cloud-example-c-e7ab3d770-ze.zephyrcloud.app\n\n\n\u003e nx run shell:build:production\n...\n ZEPHYR   https://colum_nrwl_io_7-shell-nx-zephyr-cloud-example-col-04ccb4027-ze.zephyrcloud.app\n```\n\nZephyr Cloud deployed our applications _during_ the build process!\n\nWith Zephyr Cloud, it really is _that_ easy to deploy your Module Federation Projects.\n\nYou can then visit the [Zephyr Cloud Dashboard](https://app.zephyr-cloud.io/) where you can get a more visual insight\ninto your deployed projects.\n\n## Conclusion\n\nDeploying Micro Frontend applications has always been a complex task, especially when it comes to managing multiple\nbuild artifacts and maintaining stability. However, with Nx's continued support for Module Federation and the\nintegration of Zephyr Cloud, developers now have access to a streamlined, scalable solution that simplifies the\ndeployment process significantly.  \nZephyr Cloud's unique features, such as auto-deployment, live preview links, and seamless rollback capabilities, make it\nan invaluable tool for Micro Frontend orchestration. By following the steps outlined in this guide, you can effortlessly\nset up your Nx workspace, scaffold Module Federation projects, and leverage Zephyr Cloud for quick, hassle-free\ndeployments.\n\nFor more information about Zephyr Cloud I highly recommend checking out their [docs](https://docs.zephyr-cloud.io/).\n\n## Learn More\n\n- [Nx on CI](/ci)\n- [Task Distribution with Nx Agents](/ci/features/distribute-task-execution)\n- [Automated e2e Test Splitting](/ci/features/split-e2e-tasks)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n"])</script><script>self.__next_f.push([1,"18:T16a4,"])</script><script>self.__next_f.push([1,"---\ntitle: Better security with Personal Access Tokens\nslug: personal-access-tokens\nauthors: ['Philip Fulcher']\ntags: [nx-cloud]\ncover_image: /blog/images/2024-09-10/personal-access-tokens-header.avif\nyoutubeUrl: https://youtu.be/i51LPtagb2s\n---\n\nToday, Nx Cloud gets a huge upgrade to managing access to your cached artifacts\nusing [Nx Replay](/ci/features/remote-cache). Previously, workspaces\nwere limited to defining access tokens with read or read/write permissions for an entire workspace. With the\nintroduction of _personal access tokens_, you gain much more control over access. This is a feature request we've heard\nfrom many customers, especially our [Enterprise](/enterprise) customers, and we're happy to be able to deliver this\nenhancement.\n\n## Access Tokens and the problem of revoking access\n\nOur previous implementation of access tokens required you to commit the access token to your `nx.json` file. Typically,\nservice providers don't recommend committing any kind of API token like this, and we've fielded a lot of questions about\nthis practice in the past. It is safe to commit this token, as access to the cached artifacts of Nx Cloud rely on both\nthe access token and the source code itself. Without access to both, you can't access the cache.\n\nHowever, this did present the following problem: revoking someone's access to the cache became difficult as long as they\nhad the source code. Imagine a scenario where someone has left an organization. As long as they have a clone of the\nrepo, they have everything they need to access the cache, even if their credentials have been\nrevoked. To fully revoke\ntheir access would require cycling the access token, which could interrupt the work of other developers and CI\npipelines.\n\n## Access Tokens become CI Access Tokens\n\nWhat we previously called \"access tokens\" will now be called \"[CI access tokens](/ci/recipes/security/access-tokens).\"\nThey are still defined at the workspace\nlevel, but are designed for use in CI. These tokens should be set as environment variables or secrets on your CI\nplatform so that they're no longer committed to your repo.\n\n## What are personal access tokens?\n\n[Personal access tokens](/ci/recipes/security/personal-access-tokens) are a new type of access token that is scoped to\nan individual user, rather than the workspace. This token authenticates the user with Nx Cloud when running tasks, so that we can validate their access to the distributed cache for a workspace. As soon as a user loses access to an Nx Cloud organization, they will no longer be able to access the cache for any of the organization's workspaces. The user's token belongs to them and will still allow access to their remaining organizations.\n\nThis gets even more powerful when combined with the GitHub VCS integration. When a user's GitHub access is removed from\na GitHub-connected organization, their access to your Nx Cloud organization is removed, and their access to the cache for any of the organization's workspaces is removed.\nThis means that Nx Cloud can fit into existing user de-provisioning processes you already have.\n\nOpen source teams also benefit from personal access tokens. You can configure your access to allow anonymous users to\nread from the cache, but limit read/write access to core contributors.\n\n## Controlling default access\n\n![Personal access token settings in Nx Cloud workspace](/blog/images/2024-09-10/workspace-settings.avif)\n\nBy default, a workspace that opts in to personal access tokens will allow anonymous users (users without a personal\naccess token defined) read-write access. This can be changed to disallow access to the cache for anonymous users\nin your workspace settings.\n\nUsers with personal access tokens will also have read-write access to the cache. This can be changed to enable read-only\naccess in the workspace settings.\n\n## Converting existing workspaces to use personal access tokens\n\nPersonal access tokens can be enabled with _Nx versions 13+_. These steps will get you started, but you\ncan [find more details in our docs](/ci/recipes/security/personal-access-tokens).\n\n1. **Convert to using `nxCloudId` by running `npx nx-cloud convert-to-nx-cloud-id`** - Previously, your `nx.json` had a\n   CI\n   access token defined in the `nxCloudAccessToken` property. This command will replace that with `nxCloudId`, a generic\n   id that references your workspace but no longer provides access to the cache.\n2. **Generate a personal access token by running `npx nx login`** - Follow the directions in your terminal to log\n   in\n   to Nx Cloud. Each contributor with access to the workspace will need to complete this step.\n3. **Move CI access tokens to environment variables** - Now that the access token is no longer committed to your\n   `nx.json`,\n   you'll need to provide that CI access token via the\n   `NX_CLOUD_ACCESS_TOKEN` [environment variable](/ci/reference/env-vars#nxcloudaccesstoken).\n4. **_Recommended_ Disable anonymous access** - By default, anyone without a personal access token will have read-write\n   access\n   to your cached artifacts. You can disable this anonymous access in\n   your Nx Cloud workspace settings.\n\n[Learn more about using personal access tokens](/ci/recipes/security/personal-access-tokens)\n\n## Learn more\n\n- [Nx Docs](/getting-started/intro)\n- [Nx Cloud Cache Security](/ci/concepts/cache-security)\n- [Nx Cloud Personal Access Tokens](/ci/recipes/security/personal-access-tokens)\n- [Nx Cloud CI Access Tokens](/ci/recipes/security/access-tokens)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx GitHub](https://github.com/nrwl/nx)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n- [Speed up your CI](/nx-cloud)\n"])</script><script>self.__next_f.push([1,"19:{\"name\":\"Philip Fulcher\",\"image\":\"/blog/images/Philip Fulcher.jpeg\",\"twitter\":\"philipjfulcher\",\"github\":\"philipjfulcher\"}\n1a:{\"name\":\"Mike Hartington\",\"image\":\"/blog/images/Mike Hartington.png\",\"twitter\":\"mhartington\",\"github\":\"mhartington\"}\n1b:T8ef,"])</script><script>self.__next_f.push([1,"---\ntitle: Announcing your Monorepo World Speakers\nslug: announcing-your-monorepo-world-speakers\nauthors: ['Mike Hartington']\ntags: [monorepo-world]\ncover_image: /blog/images/2024-08-30/mw-blog-post.avif\n---\n\n[Monorepo World](https://monorepo.world) is our two-track conference bringing together experts in developer tooling and of course, monorepos. We’re thrilled to share some of this year's speakers, including folks from Zephyr Cloud, Atlassian, GitHub, and HeroDevs. Without further ado, let’s meet your first round of speakers!\n\n### Hacking Bundlers in Nx\n\n[Lois Zhao](https://x.com/zmzlois), Zephyr Cloud\n\nWant to know how builders work and how they can impact your projects? Let’s look at various bundlers and see how they affect the build time and output while also potentially saving organizations millions of dollars.\n\n### What's In Your Dependency Graph\n\n[Josh VanAllen](https://x.com/JVAsays), HeroDevs\n\nEver ask yourself “why is this build taking so long?” You’re not alone. With monorepos, managing your workspace’s dependency graph can make the difference between spending countless hours waiting to see if your simple changes fixes your apps. Learn how to find the hidden bottlenecks in your dependency graphs and make them efficient!\n\n### How To Use Git - The Right Way - For Monorepos\n\n[Scott Arbeit](https://x.com/ScottArbeit), GitHub\n\nWe all use git in our day to day, and it’s great! Until you have to clone a large repository, like potentially a monorepo. Thankfully, there are some tips and tricks you can use to work with large repositories and git that can greatly improve your user experience.\n\n### Atlassian Frontend's Journey To The Monorepo\n\nManoraj K \u0026 Sourav Shaw, Atlassian\n\nAdopting a monorepo for an organization can be a transformative experience. Learn from the folks at Atlassian to hear how they migrated to a monorepo and what strategies they employ to merge multiple repositories into one unified structure.\n\n## Get Your Tickets Today\n\nWe hope you’re excited to see these amazing sessions! We’ll have more to share soon about what other speakers you can expect to see at Monorepo world! Don’t forget to register and get your ticket before prices go up September 6th 😱!\n\n[Get your tickets today!](https://bit.ly/3YZcb5r)\n"])</script><script>self.__next_f.push([1,"1c:Ta34,"])</script><script>self.__next_f.push([1,"---\ntitle: New Table Log View on CI with Nx Cloud\nslug: improved-ci-log-with-nx-cloud\nauthors: ['Juri Strumpflohner']\ntags: [nx-cloud, release]\ncover_image: /blog/images/2024-08/nx-cloud-table-log-output-thumb.jpg\nyoutubeUrl: https://youtu.be/aacrw0H0m4Q\n---\n\nWhenever we talk about Nx Cloud, speed is often a major focus—and for good reason. However, Nx Cloud isn't just about speed. Similar to Nx itself, it's about making work within monorepos more pleasant and efficient. A key part of that is continuously **optimizing developer ergonomics**.\n\nStructuring your log output is one example. In a polyrepo setup, this isn't a big deal since you typically run tasks for a single project. However, in a monorepo setup, you might be running hundreds of tasks in parallel across multiple projects. **Quickly finding a failed task in this context can be challenging.**\n\n## New Table Log View\n\nToday, we released an update that improves how logs are displayed on your CI provider when using Nx Cloud. Instead of streaming all logs directly into your CI provider's pipeline, **we now render a structured table view**. This table shows all tasks, their status (success or failure), timing, and whether they had a cache hit or miss.\n\n![New Table Log View](/blog/images/2024-08/circle-table-log-view.avif)\n\nAt the end of the log output, you'll also see aggregated stats about executed tasks, cache hits, and a link to the Nx Cloud dashboard with full details of the run.\n\n![Nx Cloud Dashboard](/blog/images/2024-08/nx-cloud-dashboard-log-view.avif)\n\n## Revert to the Old Behavior\n\nIf you prefer the previous log view in your CI, you can opt-out of the new table view. Simply go to your Nx Cloud workspace settings and enable the \"Display live terminal outputs in CI pipeline log\" option.\n\n![](/blog/images/2024-08/nxcloud-display-live-terminal-output.avif)\n\n## Not Using Nx Cloud Yet?\n\nIf you're not on Nx Cloud yet, you can **connect your Nx workspace** by running:\n\n```shell\nnpx nx connect\n```\n\nThis command will guide you through the setup. We recently introduced a [new Hobby plan](/pricing), which lets you experiment with all the Nx Cloud features for free. This is a great way to see if it's a good fit for your team.\n\n## Learn More\n\n- [Nx on CI](/ci)\n- [Task Distribution with Nx Agents](/ci/features/distribute-task-execution)\n- [Automated e2e Test Splitting](/ci/features/split-e2e-tasks)\n- [X/Twitter](https://twitter.com/nxdevtools) -- [LinkedIn](https://www.linkedin.com/company/nrwl/)\n- [Nx Official Discord Server](https://go.nx.dev/community)\n- [Nx Youtube Channel](https://www.youtube.com/@nxdevtools)\n"])</script><script>self.__next_f.push([1,"1d:{\"name\":\"Juri Strumpflohner\",\"image\":\"/blog/images/Juri Strumpfloner.jpeg\",\"twitter\":\"juristr\",\"github\":\"juristr\"}\n1e:T4bb,---\ntitle: 'Nx Enterprise Podcast Episode 4: Cvent Platform Architecture Panel'\nslug: 'cvent-podcast-3'\nauthors: ['Zack DeRose']\ntags: [podcast]\ncover_image: /blog/images/2024-08-21/ep-4-cvent.png\npodcastYoutubeId: _7uK1V_xu9k\npodcastSpotifyId: 1zWuMFxcnGy90AN41gkodx\npodcastAmazonUrl: https://music.amazon.com/podcasts/a221fdad-36fd-4695-a5b4-038d7b99d284/episodes/7e19eb25-76f9-4d1e-89c0-c2fd1f585f9b/the-enterprise-software-podcast-by-nx-the-enterprise-software-podcast-by-nx-4-cvent-platform-architect-panel\npodcastAppleUrl: https://podcasts.apple.com/us/podcast/the-enterprise-software-podcast-by-nx-4-cvent/id1752704996?i=1000666133320\npodcastIHeartUrl: https://www.iheart.com/podcast/269-the-enterprise-software-po-186891508/episode/the-enterprise-software-podcast-by-nx-207751657/\n---\n\nIn this edition of the Nx Enterprise Podcast, Zack sits down with a panel of Platform Architects from the event platform company, [Cvent](https://www.cvent.com/).\n\nThe panel, featuring Youssef Taghlabi, Kevin O'Brien, Josh Lartz, and Ladi Kobiti, dives into their approach to platform engineering—focusing on how they empower teams across their organization and the critical role Nx plays in achieving those goals.\n1f:T4a0,---\ntitle: 'Nx Enterprise Podcast Episode 3: Ahmed Elsakaan'\nslug: 'ahmed-elsakaan-podcast-3'\nauthors: ['Zack DeRose']\ntags: [podcast]\ncover_image: /blog/images/2024-08-14/ep-3-ahmed.png\npodcastYoutubeId: l_b6EOXqYRg\npodcastSpotifyId: 4d4oE8B3y9BmECZ3P4uvDP\npodcastAmazonUrl: https://music.amazon.com/podcasts/a221fdad-36fd-4695-a5b4-038d7b99d284/episodes/28209cf9-1b88-48b5-a798-7b24c843e9b1/the-enterprise-software-podcast-by-nx-the-enterprise-software-podcast-by-nx-3-ahmed-elsakaan\npodcastAppleUrl: https://podcasts.apple.com/us/podcast/the-enterprise-software-podcast-by-nx-3-ahmed-elsakaan/id1752704996?i=1000665363260\npodcastIHeartUrl: https://www.iheart.com/podcast/269-the-enterprise-software-p"])</script><script>self.__next_f.push([1,"o-186891508/episode/the-enterprise-software-podcast-by-nx-205664230/\n---\n\nIn this episode we welcome Nx Champion and creator of [noodle](https://noodle.run) and [OrbitKit](https://orbitkit.dev/): Ahmed Elsakaan.\n\nAs a monorepo enthusiast, we explore Ahmed's thoughts on monorepos and how these tools can add value to developers - both in the space of setting up your monorepo (like Nx does) and in the space of creating reusable customizable modules (like OrbitKit is attempting).\n20:T4b99,"])</script><script>self.__next_f.push([1,"---\ntitle: 'Nx 19.5 is here! Stackblitz, Bun, Incremental Builds for Vite, Gradle Test Atomizer'\nslug: 'nx-19-5-adds-stackblitz-new-features-and-more'\nauthors: ['Zack DeRose']\ncover_image: '/blog/images/2024-08-01/nx-19-5-thumbnail.png'\ntags: [nx, release]\n---\n\n## Table of Contents\n\nIn this blog post:\n\n- [Video Summary](#video-summary)\n- [Announcing Nx Cloud Hobby Tier](#announcing-nx-cloud-hobby-tier)\n- [StackBlitz Support](#stackblitz-support)\n- [Bun and Pnpm v9 Support](#bun-and-pnpm-v9-support)\n- [Local Flaky Task Detection](#local-flaky-task-detection)\n- [Project Detail View Enhancements](#project-detail-view-enhancements)\n- [Pattern Support for `targetDefaults`](#pattern-support-for-targetdefaults)\n- [Individual Targets Can Now Opt Out of Parallelism](#individual-targets-can-now-opt-out-of-parallelism)\n- [Support For Incremental Builds For Vite](#support-for-incremental-builds-for-vite)\n- [Project Crystal Conversion Generators](#project-crystal-conversion-generators)\n- [Gradle Composite Builds Support](#gradle-composite-builds-support)\n- [Experimental: Gradle Test Atomization](#experimental-gradle-test-atomization)\n- [Experimental: Nx Release Adds File Based Versioning Support](#experimental-nx-release-adds-file-based-versioning-support)\n-
